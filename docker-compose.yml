version: "3.8"

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
      READ_ONLY_API: "no"
      EXISTING_SESSION_DETECTED_ACTION: "primary"
      TWOFA_TIMEOUT_ACTION: "restart"
      JAVA_HEAP_SIZE: "512"
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
    ports:
      # VNC for debugging only — bind to localhost
      - "127.0.0.1:5900:5900"
    volumes:
      - ib-gateway-data:/home/ibgateway/Jts
    # Gateway resets TrustedIPs=127.0.0.1 on every restart, blocking
    # Docker containers.  Socat proxy on port 4003 forwards to localhost:4002
    # which is trusted.  Socat starts in background before the gateway runs.
    command: ["/bin/bash", "-c", "socat TCP-LISTEN:4003,fork,reuseaddr TCP:127.0.0.1:4002 & exec /home/ibgateway/scripts/run.sh"]
    healthcheck:
      # Health check tests the PROXY port (4003) not just raw 4002
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4003'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  mancini-bot:
    build: .
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
    environment:
      IB_HOST: ib-gateway
      IB_PORT: "4003"
      TZ: America/New_York
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    restart: unless-stopped
    depends_on:
      - mancini-bot
    environment:
      STATUS_FILE: /app/logs/status.json
      LOG_FILE: /app/logs/bot.log
      DASHBOARD_PORT: "8080"
      TZ: America/New_York
      SUBSTACK_COOKIE: ${SUBSTACK_COOKIE}
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command: ["python3", "live/dashboard.py"]

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    restart: unless-stopped
    depends_on:
      - mancini-bot
    environment:
      TZ: America/New_York
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "live/discord_bot.py"]

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    restart: unless-stopped
    depends_on:
      - mancini-bot
    environment:
      TZ: America/New_York
      WATCHDOG_WEBHOOK: ${WATCHDOG_WEBHOOK:-}
    volumes:
      - ./logs:/app/logs
    command: ["python3", "live/watchdog.py", "--poll-interval", "30"]

volumes:
  ib-gateway-data:
